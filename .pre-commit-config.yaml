---
# Use `pre-commit autoupdate` to keep hooks versions up to date
repos:
    - repo: https://github.com/pre-commit/pre-commit-hooks
      rev: v6.0.0
      hooks:
          - id: trailing-whitespace
          - id: end-of-file-fixer
          - id: check-yaml
          - id: check-added-large-files

    - repo: local
      hooks:
          - id: gofmt
            name: Check formatting
            entry: gofmt -l -w .
            language: system
            files: \.go$
